name: gitleaks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    name: scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Use the gitleaks CLI directly — gitleaks-action@v2 requires a paid
      # GITLEAKS_LICENSE for organization repos, which blocks every PR.
      # The CLI is free and scans the working tree against .gitleaks.toml.
      - name: Run gitleaks
        run: |
          VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --no-git --source . --config .gitleaks.toml --redact --no-banner
