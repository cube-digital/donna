<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Goofy UI — component library</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Fredoka:wght@400;500;600;700&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="goofy-ui.css">

  <style>
    html, body { margin: 0; height: 100%; }
    #root { min-height: 100%; }

    /* ── Showcase layout (lives on top of .gx tokens) ─────────── */
    .sc-wrap { max-width: 1040px; margin: 0 auto; padding: 28px 28px 80px; }

    .sc-masthead {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
      padding: 18px 22px; margin-bottom: 26px;
      border: 2.5px solid var(--ink);
      border-radius: 18px;
      box-shadow: 5px 5px 0 var(--ink);
      background: var(--bg-1);
    }
    .sc-brand { display: flex; align-items: center; gap: 14px; }
    .sc-logo {
      width: 52px; height: 52px; display: grid; place-items: center;
      font-size: 30px; border: 2.5px solid var(--ink); border-radius: 15px;
      box-shadow: 2px 2px 0 var(--ink); background: var(--pop-sun);
    }
    .sc-masthead h1 { margin: 0; font-size: 28px; }
    .sc-masthead p { margin: 2px 0 0; font-size: 18px; }
    .sc-controls { display: flex; align-items: center; gap: 16px; }
    .sc-toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; color: var(--text-2); cursor: pointer; }

    .sc-section { margin-bottom: 34px; }
    .sc-shead { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 2px dashed var(--border); }
    .sc-shead h2 { margin: 0; font-size: 20px; }
    .sc-shead .gx-hand { font-size: 18px; }

    .sc-body { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; align-items: start; }
    .sc-cell {
      border: 2px solid var(--border);
      border-radius: 13px;
      background: var(--bg-1);
      padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
      min-height: 92px;
    }
    .sc-cell.wide { grid-column: 1 / -1; }
    .sc-cell-demo { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; flex: 1; }
    .sc-cell-label { font-family: "Geist Mono", monospace; font-size: 10.5px; letter-spacing: 0.03em; text-transform: uppercase; color: var(--text-3); }
    .sc-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }

    /* color scheme swatches */
    .sc-body:has(.sc-scheme) { grid-template-columns: 1fr 1fr; }
    .sc-scheme {
      border: 2px solid var(--border); border-radius: 13px;
      background: var(--bg-1); padding: 16px;
    }
    .sc-scheme-h { font-size: 11px; letter-spacing: 0.06em; color: var(--text-3); margin-bottom: 12px; }
    .sc-swatches { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .sc-swatch { display: flex; align-items: center; gap: 10px; }
    .sc-swatch .chip { width: 34px; height: 34px; border: 2px solid var(--ink); border-radius: 9px; box-shadow: 1.5px 1.5px 0 var(--ink); flex-shrink: 0; }
    .sc-swatch .meta { display: flex; flex-direction: column; line-height: 1.2; min-width: 0; }
    .sc-swatch .meta b { font-size: 12.5px; color: var(--text-0); }
    .sc-swatch .meta code { font-size: 10.5px; color: var(--text-3); }

    .sc-foot { text-align: center; font-size: 18px; margin-top: 10px; }

    @media (max-width: 720px) {
      .sc-body:has(.sc-scheme) { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="showcase.jsx"></script>
</body>
</html>
