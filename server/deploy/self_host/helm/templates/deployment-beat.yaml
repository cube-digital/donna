apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "donna.fullname" . }}-beat
  labels: {{- include "donna.labels" . | nindent 4 }}
spec:
  replicas: 1   # never >1 — concurrent beats double-fire schedules
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: beat
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: beat
    spec:
      serviceAccountName: {{ include "donna.serviceAccountName" . }}
      containers:
        - name: beat
          image: {{ include "donna.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["celery", "-A", "donna", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]
          envFrom: {{- include "donna.envFrom" . | nindent 12 }}
          resources: {{- toYaml .Values.resources.beat | nindent 12 }}
