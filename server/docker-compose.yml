# Donna local stack.
#
# Credentials, hosts, and tunables come from .env (compose interpolates
# `${VAR}` references at parse time AND containers pull the same file via
# env_file:). See .env.example for the full list.
#
# Services:
#   database  — Postgres (data)
#   cache     — Redis (Celery broker + Channels layer + cache)
#   graph     — FalkorDB (Graphiti knowledge graph)
#   server    — Django/uvicorn (HTTP + WebSockets in one ASGI process)
#                runs migrate + collectstatic on start via deploy/entrypoint.sh
#   worker    — Celery worker for connector ingestion tasks
#   beat      — Celery beat scheduler (Gmail + Drive sync fanouts)
#
# Bring up:
#   docker compose up --build
#
# One-off commands:
#   docker compose run --rm server python manage.py integrations_bootstrap
#   docker compose run --rm server python manage.py createsuperuser
#   docker compose run --rm server python manage.py shell

services:
  database:
    image: postgres:17-alpine
    container_name: donna-database
    environment:
      POSTGRES_DB:       ${DATABASE_NAME:-donna}
      POSTGRES_USER:     ${DATABASE_USERNAME:-donna}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-donna}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DATABASE_HOST_PORT:-5551}:${DATABASE_PORT:-5432}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-donna} -d ${DATABASE_NAME:-donna}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

  cache:
    image: redis:7-alpine
    container_name: donna-cache
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_HOST_PORT:-6667}:${REDIS_PORT:-6379}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

  graph:
    image: falkordb/falkordb:latest
    container_name: donna-graph
    volumes:
      - falkor_data:/data
    ports:
      - "${GRAPH_HOST_PORT:-6669}:${GRAPH_PORT:-6379}"
      - "${GRAPH_BROWSER_HOST_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

  server:
    image: donna
    container_name: donna-server
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - env/.env.docker
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
      graph:
        condition: service_healthy
    volumes:
      - ./donna:/opt/donna/donna
      - ./var/storage:/var/donna/storage
    ports:
      - "${WEB_HOST_PORT:-8190}:8000"

  worker:
    image: donna
    container_name: donna-worker
    restart: unless-stopped
    # entrypoint cleared so we don't re-run migrate/collectstatic per worker;
    # those happen exactly once in the `server` container.
    entrypoint: []
    command:
      - celery
      - -A
      - donna
      - worker
      - --loglevel=${CELERY_LOG_LEVEL:-info}
      - --concurrency=${CELERY_CONCURRENCY:-4}
    env_file:
      - env/.env.docker
    volumes:
      - ./donna:/opt/donna/donna
      - ./var/storage:/var/donna/storage
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
      graph:
        condition: service_healthy
      server:
        condition: service_started

  beat:
    image: donna
    container_name: donna-beat-machine
    restart: unless-stopped
    entrypoint: []
    command:
      - celery
      - -A
      - donna
      - beat
      - --loglevel=${CELERY_LOG_LEVEL:-info}
      - --schedule=/tmp/celerybeat-schedule
    env_file:
      - env/.env.docker
    volumes:
      - ./donna:/opt/donna/donna
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
      graph:
        condition: service_healthy
      server:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
  falkor_data:
