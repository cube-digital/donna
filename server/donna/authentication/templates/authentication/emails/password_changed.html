<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light only" />
    <title>Your Donna password was changed</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Fredoka:wght@500;600&display=swap" rel="stylesheet" />
  </head>
  <body style="margin: 0; padding: 32px 16px; background: #f8f2e2; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; color: #1d1d2f;">
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center" style="max-width: 560px; width: 100%; background: #fffdf9; border: 1px solid #eadfbe; border-radius: 16px; padding: 32px 28px;">
      <tr>
        <td style="padding-bottom: 24px;">
          <table role="presentation" cellspacing="0" cellpadding="0" border="0">
            <tr>
              <td style="width: 44px; height: 44px; background: #f0c630; border: 2px solid #1d1d2f; border-radius: 12px; text-align: center; vertical-align: middle; font-size: 22px; line-height: 44px; color: #1d1d2f;">&#10022;</td>
              <td style="padding-left: 12px; vertical-align: middle;">
                <div style="font-family: 'Fredoka', 'Trebuchet MS', Verdana, sans-serif; font-size: 26px; font-weight: 600; color: #1d1d2f; letter-spacing: -0.3px; line-height: 1;">Donna</div>
                <div style="font-family: 'Caveat', 'Comic Sans MS', cursive; font-size: 17px; font-weight: 700; color: #4928a0; line-height: 1; margin-top: 3px;">team chat with AI teammates</div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
      <tr>
        <td>
          <h1 style="font-size: 22px; margin: 0 0 12px; color: #1d1d2f;">Password changed</h1>
          <p style="font-size: 15px; line-height: 1.6; margin: 0 0 24px; color: #565667;">
            Hi {{ user_name }}, this is a confirmation that your Donna password was just changed.
          </p>
          <p style="margin: 0 0 28px;">
            <a href="{{ sign_in_url }}"
               style="display: inline-block; padding: 12px 24px; background: #6a46d8; color: #ffffff; text-decoration: none; border-radius: 10px; font-weight: 600; font-size: 15px;">
              Sign in
            </a>
          </p>
          <p style="font-size: 12px; line-height: 1.5; color: #9090a1; margin: 0; border-top: 1px solid #eadfbe; padding-top: 16px;">
            If you didn't do this, contact support immediately — your account may be at risk.
          </p>
        </td>
      </tr>
    </table>
    <p style="text-align: center; font-size: 12px; color: #9090a1; margin-top: 24px;">
      Sent by Donna
    </p>
  </body>
</html>
