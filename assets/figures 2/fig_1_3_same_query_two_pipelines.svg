<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 980" font-family="'Fredoka','Trebuchet MS',sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Figure 1.3 — Same query, two pipelines</title>
  <desc id="desc">A single query, an associate's gross-margin benchmark question, runs through a standard RAG pipeline on the left producing a stale-benchmark wrong answer, and through an agentic loop on the right producing the right call. Drawn in the Goofy sticker style: chunky ink borders, hard offset shadows, crayon-box accents.</desc>

  <!-- Cream paper background -->
  <rect x="0" y="0" width="1000" height="980" fill="#FAF6E8"/>
  <!-- Subtle paper-dot texture -->
  <defs>
    <pattern id="dots" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#2A1F38" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="1000" height="980" fill="url(#dots)"/>

  <!-- ─── TOP: the query ─── -->
  <!-- Shadow under bubble -->
  <path d="M 184 64 L 820 64 Q 838 64 838 82 L 838 156 Q 838 174 820 174 L 480 174 L 460 196 L 480 174 L 184 174 Q 166 174 166 156 L 166 82 Q 166 64 184 64 Z"
        fill="#2A1F38" transform="translate(5,5)"/>
  <!-- Bubble -->
  <path d="M 184 64 L 820 64 Q 838 64 838 82 L 838 156 Q 838 174 820 174 L 480 174 L 460 196 L 480 174 L 184 174 Q 166 174 166 156 L 166 82 Q 166 64 184 64 Z"
        fill="#FEFCF3" stroke="#2A1F38" stroke-width="2.5"/>
  <text x="500" y="105" text-anchor="middle" font-size="17" font-weight="500" fill="#2A1F38">An associate asks:</text>
  <text x="500" y="140" text-anchor="middle" font-size="19" font-weight="600" fill="#2A1F38">"What gross-margin benchmark applies to this client's</text>
  <text x="500" y="162" text-anchor="middle" font-size="19" font-weight="600" fill="#2A1F38">SaaS comparison on the current methodology?"</text>

  <!-- Hand-drawn label between -->
  <text x="500" y="232" text-anchor="middle" font-size="22" font-family="'Caveat','Comic Sans MS',cursive" fill="#9A4DD0" font-weight="500" font-style="italic">same query · two pipelines</text>

  <!-- Column dividing line (subtle) -->
  <line x1="500" y1="260" x2="500" y2="940" stroke="#2A1F38" stroke-width="1" stroke-dasharray="4 6" opacity="0.25"/>

  <!-- ═══════════════════════════════════════════════════════════════
       LEFT COLUMN — Standard RAG
       ═══════════════════════════════════════════════════════════════ -->

  <!-- Header chip — coral sticker -->
  <rect x="89" y="275" width="222" height="44" rx="22" fill="#2A1F38"/>
  <rect x="85" y="271" width="222" height="44" rx="22" fill="#ED7E5E" stroke="#2A1F38" stroke-width="2.5"/>
  <text x="196" y="299" text-anchor="middle" font-size="18" font-weight="600" fill="#2A1F38">STANDARD RAG</text>

  <!-- Step 1 -->
  <rect x="84" y="354" width="320" height="68" rx="11" fill="#2A1F38"/>
  <rect x="80" y="350" width="320" height="68" rx="11" fill="#FEFCF3" stroke="#2A1F38" stroke-width="2.5"/>
  <text x="240" y="380" text-anchor="middle" font-size="15" font-weight="600" fill="#2A1F38">Embed entire query</text>
  <text x="240" y="402" text-anchor="middle" font-size="13" fill="#46395A">as one vector</text>

  <!-- Arrow down -->
  <path d="M 240 425 L 240 450 M 232 442 L 240 452 L 248 442" stroke="#2A1F38" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Step 2 -->
  <rect x="84" y="459" width="320" height="68" rx="11" fill="#2A1F38"/>
  <rect x="80" y="455" width="320" height="68" rx="11" fill="#FEFCF3" stroke="#2A1F38" stroke-width="2.5"/>
  <text x="240" y="485" text-anchor="middle" font-size="15" font-weight="600" fill="#2A1F38">Top-N retrieval</text>
  <text x="240" y="507" text-anchor="middle" font-size="13" fill="#46395A">from one vector store</text>

  <!-- Arrow -->
  <path d="M 240 530 L 240 555 M 232 547 L 240 557 L 248 547" stroke="#2A1F38" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Step 3 -->
  <rect x="84" y="564" width="320" height="68" rx="11" fill="#2A1F38"/>
  <rect x="80" y="560" width="320" height="68" rx="11" fill="#FEFCF3" stroke="#2A1F38" stroke-width="2.5"/>
  <text x="240" y="590" text-anchor="middle" font-size="15" font-weight="600" fill="#2A1F38">LLM generates</text>
  <text x="240" y="612" text-anchor="middle" font-size="13" fill="#46395A">one pass · no check</text>

  <!-- Arrow -->
  <path d="M 240 635 L 240 668 M 232 660 L 240 670 L 248 660" stroke="#2A1F38" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Step 4 — wrong answer -->
  <rect x="84" y="681" width="320" height="100" rx="11" fill="#2A1F38"/>
  <rect x="80" y="677" width="320" height="100" rx="11" fill="#F8D8CF" stroke="#E0594C" stroke-width="3"/>
  <text x="240" y="708" text-anchor="middle" font-size="14" font-weight="700" fill="#A23929">Answer: 2024 benchmark</text>
  <text x="240" y="730" text-anchor="middle" font-size="13" fill="#A23929">Confident · cited · from one source</text>
  <text x="240" y="757" text-anchor="middle" font-size="14" font-weight="600" fill="#A23929">→ goes into client deck</text>

  <!-- Hand-drawn annotation -->
  <text x="240" y="813" text-anchor="middle" font-size="20" font-family="'Caveat','Comic Sans MS',cursive" fill="#E0594C" font-weight="500" font-style="italic">stale. follow-on lost.</text>
  <!-- Hand-drawn underline squiggle -->
  <path d="M 130 825 Q 180 833, 240 825 T 350 825" stroke="#E0594C" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- ═══════════════════════════════════════════════════════════════
       RIGHT COLUMN — Agentic
       ═══════════════════════════════════════════════════════════════ -->

  <!-- Header chip — ai grape sticker -->
  <rect x="697" y="275" width="222" height="44" rx="22" fill="#2A1F38"/>
  <rect x="693" y="271" width="222" height="44" rx="22" fill="#9A4DD0" stroke="#2A1F38" stroke-width="2.5"/>
  <text x="804" y="299" text-anchor="middle" font-size="18" font-weight="600" fill="#FEFCF3">AGENTIC LOOP</text>

  <!-- Step 1 — decompose -->
  <rect x="604" y="354" width="320" height="78" rx="11" fill="#2A1F38"/>
  <rect x="600" y="350" width="320" height="78" rx="11" fill="#ECDDF6" stroke="#2A1F38" stroke-width="2.5"/>
  <text x="760" y="378" text-anchor="middle" font-size="15" font-weight="600" fill="#2A1F38">Decompose into 3 sub-queries</text>
  <text x="760" y="400" text-anchor="middle" font-size="12" fill="#46395A">1 · segment   2 · growth stage</text>
  <text x="760" y="418" text-anchor="middle" font-size="12" fill="#46395A">3 · methodology version</text>

  <!-- Arrow -->
  <path d="M 760 435 L 760 458 M 752 450 L 760 460 L 768 450" stroke="#2A1F38" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Step 2 — EMS query -->
  <rect x="604" y="467" width="320" height="60" rx="11" fill="#2A1F38"/>
  <rect x="600" y="463" width="320" height="60" rx="11" fill="#C8DEF9" stroke="#2A1F38" stroke-width="2.5"/>
  <text x="760" y="490" text-anchor="middle" font-size="15" font-weight="600" fill="#2A1F38">Structured query → EMS</text>
  <text x="760" y="510" text-anchor="middle" font-size="12" fill="#46395A">segment · growth stage</text>

  <!-- Arrow -->
  <path d="M 760 530 L 760 553 M 752 545 L 760 555 L 768 545" stroke="#2A1F38" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Step 3 — memo search -->
  <rect x="604" y="562" width="320" height="60" rx="11" fill="#2A1F38"/>
  <rect x="600" y="558" width="320" height="60" rx="11" fill="#C8DEF9" stroke="#2A1F38" stroke-width="2.5"/>
  <text x="760" y="585" text-anchor="middle" font-size="15" font-weight="600" fill="#2A1F38">Memo search → docs</text>
  <text x="760" y="605" text-anchor="middle" font-size="12" fill="#46395A">benchmark superseded?</text>

  <!-- Arrow -->
  <path d="M 760 625 L 760 648 M 752 640 L 760 650 L 768 640" stroke="#2A1F38" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Decision diamond — self-eval -->
  <path d="M 760 655 L 824 695 L 760 735 L 696 695 Z" fill="#2A1F38" transform="translate(5,5)"/>
  <path d="M 760 655 L 824 695 L 760 735 L 696 695 Z" fill="#F4D34A" stroke="#2A1F38" stroke-width="2.5"/>
  <text x="760" y="690" text-anchor="middle" font-size="13" font-weight="700" fill="#2A1F38">SELF-EVAL</text>
  <text x="760" y="708" text-anchor="middle" font-size="11" fill="#2A1F38">version conflict?</text>

  <!-- Arrow -->
  <path d="M 760 742 L 760 768 M 752 760 L 760 770 L 768 760" stroke="#2A1F38" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Step 4 — right answer -->
  <rect x="604" y="777" width="320" height="100" rx="11" fill="#2A1F38"/>
  <rect x="600" y="773" width="320" height="100" rx="11" fill="#D0EDDE" stroke="#3A9568" stroke-width="3"/>
  <text x="760" y="804" text-anchor="middle" font-size="14" font-weight="700" fill="#1E5C3D">Answer: 2 benchmarks shown</text>
  <text x="760" y="826" text-anchor="middle" font-size="13" fill="#1E5C3D">Both sources cited · conflict flagged</text>
  <text x="760" y="853" text-anchor="middle" font-size="14" font-weight="600" fill="#1E5C3D">→ associate confirms before deck</text>

  <!-- Hand-drawn annotation -->
  <text x="760" y="908" text-anchor="middle" font-size="20" font-family="'Caveat','Comic Sans MS',cursive" fill="#3A9568" font-weight="500" font-style="italic">right call. source verified.</text>
  <path d="M 660 920 Q 710 928, 760 920 T 870 920" stroke="#3A9568" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- ─── Bottom annotation spanning both ─── -->
  <rect x="84" y="954" width="836" height="22" fill="none"/>
  <text x="500" y="970" text-anchor="middle" font-size="13" font-style="italic" fill="#46395A">Same query · same corpus · two answers — the orchestration layer and the data it can reach make the difference, not the model.</text>
</svg>
