<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="'Fredoka','Trebuchet MS',sans-serif" role="img" aria-labelledby="t16 d16">
  <title id="t16">Figure 1.6 — The six-layer DonnaAI stack</title>
  <desc id="d16">Six layers stacked vertically. Bottom to top: data, retrieval, tool, memory, reasoning &amp; agentic (drawn smallest), with an operations layer wrapping the whole stack as a thin border. Each layer maps to a chapter on the right. Donna points at the top layer with a knowing comment about the agentic layer being the smallest.</desc>
  <rect width="1100" height="760" fill="#FAF6E8"/>
  <defs>
    <pattern id="dots16" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#2A1F38" fill-opacity="0.05"/>
    </pattern>
    <radialGradient id="grape16" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#C684E8"/>
      <stop offset="100%" stop-color="#7A2EAE"/>
    </radialGradient>
  </defs>
  <rect width="1100" height="760" fill="url(#dots16)"/>

  <text x="60" y="44" font-size="22" font-weight="600" fill="#2A1F38">The six-layer stack · agentic is the smallest, last layer</text>
  <text x="60" y="68" font-size="13" font-style="italic" fill="#46395A">Build bottom-up. Each layer depends on the one below it.</text>

  <!-- ─── OPERATIONS WRAPPER (thin outer border) ─── -->
  <rect x="216" y="116" width="500" height="608" rx="18" fill="#2A1F38" transform="translate(6,6)"/>
  <rect x="210" y="110" width="500" height="608" rx="18" fill="none" stroke="#2A1F38" stroke-width="3"/>
  <rect x="210" y="110" width="500" height="608" rx="18" fill="#46395A" fill-opacity="0.08"/>

  <!-- Ops label top -->
  <rect x="270" y="98" width="200" height="32" rx="11" fill="#2A1F38" transform="translate(3,3)"/>
  <rect x="270" y="98" width="200" height="32" rx="11" fill="#46395A" stroke="#2A1F38" stroke-width="2.5"/>
  <text x="370" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#FEFCF3">OPERATIONS · wraps everything</text>

  <!-- ─── Layer 5 (TOP) — Reasoning & agentic — DRAWN SMALLEST ─── -->
  <g transform="translate(280,150)">
    <rect x="0" y="0" width="360" height="56" rx="11" fill="#2A1F38" transform="translate(4,4)"/>
    <rect x="0" y="0" width="360" height="56" rx="11" fill="#9A4DD0" stroke="#2A1F38" stroke-width="3"/>
    <text x="180" y="24" text-anchor="middle" font-size="14" font-weight="800" fill="#FEFCF3">REASONING &amp; AGENTIC</text>
    <text x="180" y="44" text-anchor="middle" font-size="11" fill="#ECDDF6">reflection · planning · tool use · multi-agent</text>
  </g>
  <!-- Ch tag -->
  <g transform="translate(660,166)">
    <rect x="0" y="0" width="80" height="24" rx="6" fill="#2A1F38" transform="translate(3,3)"/>
    <rect x="0" y="0" width="80" height="24" rx="6" fill="#9A4DD0" stroke="#2A1F38" stroke-width="2"/>
    <text x="40" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#FEFCF3">Ch 6 · 7</text>
  </g>

  <!-- ─── Layer 4 — Memory ─── -->
  <g transform="translate(240,224)">
    <rect x="0" y="0" width="440" height="76" rx="11" fill="#2A1F38" transform="translate(4,4)"/>
    <rect x="0" y="0" width="440" height="76" rx="11" fill="#D9C7F4" stroke="#2A1F38" stroke-width="2.5"/>
    <text x="220" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#2A1F38">MEMORY</text>
    <text x="220" y="48" text-anchor="middle" font-size="11" fill="#46395A">working · decision-trace · semantic</text>
    <text x="220" y="64" text-anchor="middle" font-size="11" fill="#46395A">coherence across turns</text>
  </g>
  <g transform="translate(700,247)">
    <rect x="0" y="0" width="60" height="24" rx="6" fill="#2A1F38" transform="translate(3,3)"/>
    <rect x="0" y="0" width="60" height="24" rx="6" fill="#D9C7F4" stroke="#2A1F38" stroke-width="2"/>
    <text x="30" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#2A1F38">Ch 5</text>
  </g>

  <!-- ─── Layer 3 — Tool ─── -->
  <g transform="translate(240,318)">
    <rect x="0" y="0" width="440" height="76" rx="11" fill="#2A1F38" transform="translate(4,4)"/>
    <rect x="0" y="0" width="440" height="76" rx="11" fill="#BFE8FF" stroke="#2A1F38" stroke-width="2.5"/>
    <text x="220" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#2A1F38">TOOL</text>
    <text x="220" y="48" text-anchor="middle" font-size="11" fill="#46395A">retrieval interfaces · calculator</text>
    <text x="220" y="64" text-anchor="middle" font-size="11" fill="#46395A">schema lookup · web fallback</text>
  </g>
  <g transform="translate(700,341)">
    <rect x="0" y="0" width="60" height="24" rx="6" fill="#2A1F38" transform="translate(3,3)"/>
    <rect x="0" y="0" width="60" height="24" rx="6" fill="#BFE8FF" stroke="#2A1F38" stroke-width="2"/>
    <text x="30" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#2A1F38">Ch 5</text>
  </g>

  <!-- ─── Layer 2 — Retrieval ─── -->
  <g transform="translate(240,412)">
    <rect x="0" y="0" width="440" height="92" rx="11" fill="#2A1F38" transform="translate(4,4)"/>
    <rect x="0" y="0" width="440" height="92" rx="11" fill="#85D5B0" stroke="#2A1F38" stroke-width="2.5"/>
    <text x="220" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#1E5C3D">RETRIEVAL</text>
    <text x="220" y="50" text-anchor="middle" font-size="11" fill="#1E5C3D">keyword · semantic · chunk-level</text>
    <text x="220" y="66" text-anchor="middle" font-size="11" fill="#1E5C3D">knowledge-graph · SQL</text>
    <text x="220" y="84" text-anchor="middle" font-size="10" font-style="italic" fill="#1E5C3D">multiple interfaces over the same data</text>
  </g>
  <g transform="translate(700,443)">
    <rect x="0" y="0" width="60" height="24" rx="6" fill="#2A1F38" transform="translate(3,3)"/>
    <rect x="0" y="0" width="60" height="24" rx="6" fill="#85D5B0" stroke="#2A1F38" stroke-width="2"/>
    <text x="30" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#2A1F38">Ch 4</text>
  </g>

  <!-- ─── Layer 1 (BOTTOM) — Data — LARGEST/WIDEST emphasized ─── -->
  <g transform="translate(240,522)">
    <rect x="0" y="0" width="440" height="172" rx="11" fill="#2A1F38" transform="translate(4,4)"/>
    <rect x="0" y="0" width="440" height="172" rx="11" fill="#F4D34A" stroke="#2A1F38" stroke-width="3"/>
    <text x="220" y="32" text-anchor="middle" font-size="16" font-weight="800" fill="#7E6420">DATA</text>
    <text x="220" y="56" text-anchor="middle" font-size="12" fill="#7E6420">corpus · EMS · CRM · operational DB</text>
    <text x="220" y="74" text-anchor="middle" font-size="12" fill="#7E6420">resolved against each other</text>
    <!-- chips inside data layer -->
    <g transform="translate(36,92)">
      <rect x="0" y="0" width="110" height="22" rx="5" fill="#FEFCF3" stroke="#2A1F38" stroke-width="1.5"/>
      <text x="55" y="15" text-anchor="middle" font-size="10" font-weight="600" fill="#2A1F38">anchor</text>
    </g>
    <g transform="translate(160,92)">
      <rect x="0" y="0" width="160" height="22" rx="5" fill="#FEFCF3" stroke="#2A1F38" stroke-width="1.5"/>
      <text x="80" y="15" text-anchor="middle" font-size="10" font-weight="600" fill="#2A1F38">source classification</text>
    </g>
    <g transform="translate(36,124)">
      <rect x="0" y="0" width="160" height="22" rx="5" fill="#FEFCF3" stroke="#2A1F38" stroke-width="1.5"/>
      <text x="80" y="15" text-anchor="middle" font-size="10" font-weight="600" fill="#2A1F38">identity resolution</text>
    </g>
    <g transform="translate(210,124)">
      <rect x="0" y="0" width="170" height="22" rx="5" fill="#FEFCF3" stroke="#2A1F38" stroke-width="1.5"/>
      <text x="85" y="15" text-anchor="middle" font-size="10" font-weight="600" fill="#2A1F38">determinism boundary</text>
    </g>
  </g>
  <g transform="translate(700,583)">
    <rect x="0" y="0" width="60" height="24" rx="6" fill="#2A1F38" transform="translate(3,3)"/>
    <rect x="0" y="0" width="60" height="24" rx="6" fill="#F4D34A" stroke="#2A1F38" stroke-width="2"/>
    <text x="30" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#2A1F38">Ch 3</text>
  </g>

  <!-- ─── DONNA corner — top-left pointing at smallest layer ─── -->
  <g transform="translate(90,170)">
    <g transform="translate(4,4)">
      <path d="M -36 95 Q -36 65 0 65 Q 36 65 36 95 L 44 150 L -44 150 Z" fill="#2A1F38"/>
      <ellipse cx="0" cy="18" rx="40" ry="44" fill="#2A1F38"/>
      <path d="M -40 16 Q -42 -22 -22 -32 Q -2 -45 22 -34 Q 42 -22 42 14 Q 42 24 38 40 L 38 50 Q 26 60 10 56 L 8 40 Q -2 44 -14 40 L -16 53 Q -30 60 -40 42 Z" fill="#2A1F38"/>
    </g>
    <path d="M -36 95 Q -36 65 0 65 Q 36 65 36 95 L 44 150 L -44 150 Z" fill="url(#grape16)" stroke="#2A1F38" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M -8 70 L 0 92 L 8 70" fill="none" stroke="#2A1F38" stroke-width="2"/>
    <path d="M -12 72 L 0 86 L 12 72 L 12 66 L -12 66 Z" fill="#FEFCF3" stroke="#2A1F38" stroke-width="2"/>
    <rect x="-7" y="55" width="14" height="14" fill="#F2C9B0" stroke="#2A1F38" stroke-width="2"/>
    <ellipse cx="0" cy="18" rx="40" ry="44" fill="#F2C9B0" stroke="#2A1F38" stroke-width="2.5"/>
    <path d="M -40 16 Q -42 -22 -22 -32 Q -2 -45 22 -34 Q 42 -22 42 14 Q 42 24 38 40 L 38 50 Q 26 60 10 56 L 8 40 Q -2 44 -14 40 L -16 53 Q -30 60 -40 42 Z" fill="#C84B3A" stroke="#2A1F38" stroke-width="2.5"/>
    <!-- eyes -->
    <ellipse cx="-12" cy="20" rx="3" ry="3.5" fill="#2A1F38"/>
    <ellipse cx="12" cy="20" rx="3" ry="3.5" fill="#2A1F38"/>
    <circle cx="-11" cy="19" r="1" fill="#FEFCF3"/>
    <circle cx="13" cy="19" r="1" fill="#FEFCF3"/>
    <!-- brows -->
    <path d="M -20 11 Q -14 8 -6 11" stroke="#2A1F38" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 4 8 Q 12 4 20 11" stroke="#2A1F38" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- smile -->
    <path d="M -10 36 Q 0 42 12 36" stroke="#2A1F38" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M -10 36 Q 0 40 12 36 Q 0 39 -10 36 Z" fill="#D63A2E"/>
    <circle cx="21" cy="34" r="1.3" fill="#2A1F38"/>
  </g>

  <!-- Pointing arm from Donna toward the top layer -->
  <path d="M 130 195 Q 200 195 280 180" stroke="#2A1F38" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="3 5"/>

  <!-- Speech bubble from Donna -->
  <g transform="translate(10,340)">
    <rect x="0" y="0" width="190" height="100" rx="11" fill="#2A1F38" transform="translate(4,4)"/>
    <rect x="0" y="0" width="190" height="100" rx="11" fill="#FEFCF3" stroke="#2A1F38" stroke-width="2.5"/>
    <!-- tail pointing UP-RIGHT toward Donna's body (Donna at translate 90,170 with body bottom around y=320) -->
    <path d="M 70 0 L 60 -22 L 90 0 Z" fill="#FEFCF3" stroke="#2A1F38" stroke-width="2.5"/>
    <text x="95" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#2A1F38">The agentic layer is the</text>
    <text x="95" y="42" text-anchor="middle" font-size="13" font-weight="600" fill="#2A1F38">smallest one — last on top.</text>
    <text x="95" y="68" text-anchor="middle" font-size="14" font-family="'Caveat','Comic Sans MS',cursive" font-style="italic" fill="#9A4DD0">80% of the work is below.</text>
    <text x="95" y="88" text-anchor="middle" font-size="14" font-family="'Caveat','Comic Sans MS',cursive" font-style="italic" fill="#9A4DD0">infrastructure is the book.</text>
  </g>

  <!-- Right-side caption -->
  <g transform="translate(780,520)">
    <rect x="0" y="0" width="280" height="80" rx="11" fill="#2A1F38" transform="translate(4,4)"/>
    <rect x="0" y="0" width="280" height="80" rx="11" fill="#FEFCF3" stroke="#2A1F38" stroke-width="2.5"/>
    <text x="140" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#2A1F38">Build order</text>
    <text x="140" y="46" text-anchor="middle" font-size="11" fill="#46395A">data → retrieval → tool →</text>
    <text x="140" y="62" text-anchor="middle" font-size="11" fill="#46395A">memory → reasoning → ops</text>
  </g>

  <text x="550" y="740" text-anchor="middle" font-size="12" font-style="italic" fill="#46395A">Every layer makes its decisions in a specific chapter — see Table 1.1 for the full 20-decision mapping.</text>
</svg>
